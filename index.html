<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miniclop — Retro Arcade Zone</title>
  </head>
  <body>
    <header>
      <div id="game-alert">
        ⚡ WARNING: HIGH SCORE COMPETITION ENDS IN 2 HOURS! ⚡
      </div>
      <h1>Miniclop Game Hub</h1>
      <button id="theme-btn">Switch Theme Mode</button>
    </header>

    <main id="arcade-container">
      <p>
        Welcome to Miniclop! Click below to power up your game choices,
        configure display headers, and activate interface updates.
      </p>

      <div id="game-showcase">
        <h2>Game of the Week: Retro Quest</h2>

        <img
          id="game-controller"
          src="https://www.nme.com/wp-content/uploads/2023/10/nintendo-64-controller-valued-at-1000-3.jpg"
          alt="Retro Gaming Controller"
        />

        <div class="control-panel">
          <button id="effect-btn">Activate Power Up Mode</button>
          <button id="stop-banner-btn">Stop Banner Flash</button>
        </div>
      </div>
    </main>
  </body>
</html>
